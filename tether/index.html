<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TETHER</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #040617;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: #d7f9ff;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 16px;
        box-sizing: border-box;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .center-overlay {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        max-width: 720px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
