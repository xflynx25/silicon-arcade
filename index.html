<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SILICON ARCADE</title>
    <style>
      :root {
        --bg: #04030c;
        --ink: #dfe9ff;
        --muted: #7f8bb5;
        --line: rgba(120, 160, 255, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body.playing {
        overflow: hidden;
      }

      /* ---------- animated backdrop ---------- */
      .backdrop {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .backdrop::before {
        /* drifting perspective grid */
        content: "";
        position: absolute;
        inset: -50%;
        background-image: linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 46px 46px;
        transform: perspective(600px) rotateX(62deg) translateY(0);
        animation: drift 18s linear infinite;
      }

      .backdrop::after {
        /* colored nebula glows + vignette */
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(50% 40% at 18% 12%, rgba(56, 245, 255, 0.16), transparent 70%),
          radial-gradient(46% 42% at 84% 20%, rgba(180, 107, 255, 0.16), transparent 70%),
          radial-gradient(60% 50% at 50% 108%, rgba(255, 138, 61, 0.12), transparent 70%),
          radial-gradient(120% 90% at 50% 40%, transparent 55%, rgba(2, 2, 8, 0.9) 100%);
      }

      @keyframes drift {
        to {
          background-position: 0 46px;
        }
      }

      .scanlines {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.025) 0,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 2px,
          transparent 4px
        );
        mix-blend-mode: overlay;
        opacity: 0.5;
      }

      /* ---------- page ---------- */
      .page {
        position: relative;
        z-index: 2;
        max-width: 1160px;
        margin: 0 auto;
        padding: clamp(32px, 6vh, 88px) clamp(20px, 4vw, 48px) 72px;
      }

      header {
        text-align: center;
        margin-bottom: clamp(32px, 5vh, 60px);
      }

      .kicker {
        font-size: 13px;
        letter-spacing: 0.62em;
        text-indent: 0.62em;
        color: var(--muted);
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 9vw, 104px);
        font-weight: 800;
        letter-spacing: 0.06em;
        line-height: 0.95;
        background: linear-gradient(180deg, #ffffff 0%, #9fd8ff 45%, #6aa0ff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 26px rgba(90, 160, 255, 0.5));
      }

      .subtitle {
        margin-top: 20px;
        color: var(--muted);
        font-size: clamp(14px, 1.6vw, 17px);
        letter-spacing: 0.04em;
      }

      .subtitle b {
        color: var(--ink);
        font-weight: 700;
      }

      /* ---------- grid ---------- */
      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: clamp(16px, 2.2vw, 26px);
      }

      .card {
        --accent: #38f5ff;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        min-height: 300px;
        padding: 26px 24px 24px;
        text-align: left;
        cursor: pointer;
        color: var(--ink);
        border: 1px solid rgba(150, 175, 255, 0.14);
        border-radius: 20px;
        background:
          linear-gradient(160deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.008)),
          rgba(12, 14, 30, 0.66);
        backdrop-filter: blur(6px);
        overflow: hidden;
        font: inherit;
        transition: transform 0.28s cubic-bezier(0.2, 0.9, 0.25, 1),
          border-color 0.28s ease, box-shadow 0.28s ease;
      }

      .card-glow {
        position: absolute;
        inset: -40% -30% auto;
        height: 70%;
        background: radial-gradient(60% 100% at 30% 0%, var(--accent), transparent 70%);
        opacity: 0.14;
        filter: blur(18px);
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      /* sheen sweep on hover */
      .card::after {
        content: "";
        position: absolute;
        top: 0;
        left: -60%;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          100deg,
          transparent,
          rgba(255, 255, 255, 0.14),
          transparent
        );
        transform: skewX(-18deg);
        transition: left 0.6s ease;
        pointer-events: none;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-8px);
        border-color: color-mix(in srgb, var(--accent) 60%, transparent);
        box-shadow: 0 22px 48px -22px rgba(0, 0, 0, 0.9),
          0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent),
          0 0 44px -10px color-mix(in srgb, var(--accent) 55%, transparent);
        outline: none;
      }

      .card:hover .card-glow,
      .card:focus-visible .card-glow {
        opacity: 0.34;
      }

      .card:hover::after {
        left: 130%;
      }

      .badge {
        position: absolute;
        top: 18px;
        right: 18px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        padding: 4px 9px;
        border-radius: 999px;
        color: color-mix(in srgb, var(--accent) 85%, white);
        border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
      }

      .glyph {
        display: grid;
        place-items: center;
        width: 62px;
        height: 62px;
        border-radius: 16px;
        color: var(--accent);
        border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
        background:
          radial-gradient(120% 120% at 30% 20%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
          rgba(255, 255, 255, 0.02);
        box-shadow: inset 0 0 20px -8px color-mix(in srgb, var(--accent) 70%, transparent);
      }

      .glyph svg {
        width: 34px;
        height: 34px;
        filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 60%, transparent));
      }

      .name {
        font-size: 27px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: #fff;
        text-shadow: 0 0 18px color-mix(in srgb, var(--accent) 55%, transparent);
      }

      .tag {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--accent) 80%, white);
      }

      .summary {
        font-size: 14px;
        line-height: 1.5;
        color: var(--muted);
      }

      .cta {
        margin-top: auto;
        padding-top: 8px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--accent) 78%, white);
        opacity: 0.75;
        transition: opacity 0.25s ease;
      }

      .card:hover .cta {
        opacity: 1;
      }

      .cta .arrow {
        display: inline-block;
        transition: transform 0.25s ease;
      }

      .card:hover .cta .arrow {
        transform: translateX(5px);
      }

      footer {
        margin-top: 46px;
        text-align: center;
        font-size: 12.5px;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      footer kbd {
        font: inherit;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 6px;
        border: 1px solid rgba(150, 175, 255, 0.24);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
      }

      /* ---------- game stage (iframe overlay) ---------- */
      .stage {
        --accent: #38f5ff;
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        background: #04030c;
      }

      .stage[hidden] {
        display: none;
      }

      .stage-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 46px;
        padding: 0 14px;
        flex: 0 0 auto;
        background: rgba(6, 8, 18, 0.92);
        border-bottom: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
        box-shadow: 0 6px 24px -14px color-mix(in srgb, var(--accent) 80%, transparent);
      }

      .exit {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink);
        padding: 7px 14px;
        border-radius: 9px;
        cursor: pointer;
        border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        transition: background 0.2s ease, transform 0.2s ease;
      }

      .exit:hover {
        background: color-mix(in srgb, var(--accent) 24%, transparent);
        transform: translateX(-2px);
      }

      #now-playing {
        font-weight: 800;
        letter-spacing: 0.16em;
        color: #fff;
        text-shadow: 0 0 16px color-mix(in srgb, var(--accent) 60%, transparent);
      }

      .stage-hint {
        margin-left: auto;
        font-size: 11.5px;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .stage-hint kbd {
        font: inherit;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 6px;
        border: 1px solid rgba(150, 175, 255, 0.24);
        background: rgba(255, 255, 255, 0.05);
      }

      #frame-host {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
      }

      .game-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }

      @media (prefers-reduced-motion: reduce) {
        .backdrop::before {
          animation: none;
        }
        .card,
        .card::after,
        .cta .arrow {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="page">
      <header>
        <div class="kicker">SILICON // ARCADE</div>
        <h1>SILICON ARCADE</h1>
        <p class="subtitle">
          Eight local <b>2-player</b> games · one keyboard · one screen
        </p>
      </header>

      <div id="grid"></div>

      <footer>
        Pick a cabinet to boot · <kbd>Esc</kbd> drops you back to the arcade —
        a fresh start, every time.
      </footer>
    </main>

    <section class="stage" id="stage" hidden aria-label="Game player">
      <div class="stage-bar">
        <button class="exit" id="exit" type="button">◄ Arcade</button>
        <span id="now-playing"></span>
        <span class="stage-hint">Press <kbd>Esc</kbd> to quit</span>
      </div>
      <div id="frame-host"></div>
    </section>

    <script type="module" src="/arcade/main.ts"></script>
  </body>
</html>
